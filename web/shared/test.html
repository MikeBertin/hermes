<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hermes — JS core vector tests</title>
<style>
  :root{
    --bg:#0a0a0f; --panel:#13131c; --line:#23232f;
    --ink:#e7e7ef; --muted:#8a8a9c; --pass:#5fd0c5; --fail:#ff6b6b;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1100px 700px at 50% -10%,#16161f,#0a0a0f 60%);
    color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;
    padding:40px 28px;min-height:100vh}
  .wrap{max-width:840px;margin:0 auto}
  .badge{font-family:var(--mono);font-size:12px;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
  h1{font-size:30px;margin:6px 0 4px}
  .lede{color:var(--muted);font-size:14px;margin:0 0 24px}
  #summary{font-family:var(--mono);font-size:15px;font-weight:600;margin:0 0 18px;padding:12px 16px;
    border:1px solid var(--line);border-radius:10px;background:var(--panel)}
  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12.5px}
  td{padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  td.status{width:54px;font-weight:700}
  .pass td.status{color:var(--pass)} .fail td.status{color:var(--fail)}
  .fail td.detail{color:var(--fail)}
  td.detail{color:var(--muted);word-break:break-all}
  .name{color:var(--ink)}
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">Hermes</div>
  <h1>JS core — vector tests</h1>
  <p class="lede">The browser crypto in <code>btc.js</code> must reproduce the same
    known-answer vectors as the Python core. Green here = the demos rest on correct math.</p>
  <div id="summary">running…</div>
  <table id="results"></table>
</div>

<script src="./btc.js"></script>
<script>
const H = window.Hermes;
const rows = [];
let pass = 0, fail = 0;

function check(name, got, want) {
  const ok = got === want;
  ok ? pass++ : fail++;
  rows.push({ name, ok, detail: ok ? String(want) : `got ${got}\nwant ${want}` });
}

// --- hashes ---
const sh = (s) => H.bytesToHex(H.sha256(H.utf8(s)));
check("sha256('')", sh(""), "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855");
check("sha256('abc')", sh("abc"), "ba7816bf8f01cfea414140de5dae2223b00361a396177a9cb410ff61f20015ad");
const rh = (s) => H.bytesToHex(H.ripemd160(H.utf8(s)));
check("ripemd160('')", rh(""), "9c1185a5c5e9fc54612808977ee8f548b2258d31");
check("ripemd160('abc')", rh("abc"), "8eb208f7e05d987a9b044a8e98c6b087f15a0bfc");
check("ripemd160('message digest')", rh("message digest"), "5d0689ef49d2fae572b881b123a85ffa21595f36");

// --- curve: published 2G ---
const twoG = H.ptMul(2n, H.G);
check("2G.x", twoG.x.toString(16), "c6047f9441ed7d6d3045406e95c07cd85c778e4b8cef3ca7abac09b95c709ee5");
check("2G.y", twoG.y.toString(16), "1ae168fea63dc339a3c58419466ceaeef7f632653266d0e1236431a950cfe52a");
check("n·G is infinity", H.ptMul(H.N, H.G), H.INFINITY);
check("sec(2G, uncompressed)", H.bytesToHex(H.sec(twoG, false)),
  "04c6047f9441ed7d6d3045406e95c07cd85c778e4b8cef3ca7abac09b95c709ee51ae168fea63dc339a3c58419466ceaeef7f632653266d0e1236431a950cfe52a");
check("sec(2G, compressed)", H.bytesToHex(H.sec(twoG, true)),
  "02c6047f9441ed7d6d3045406e95c07cd85c778e4b8cef3ca7abac09b95c709ee5");

// --- address pipeline vector (Bitcoin wiki) ---
const PUB = "0450863ad64a87ae8a2fe83c1af1a8403cb53f53e486d8511dad8a04887e5b23522cd470243453a299fa9e77237716103abc11a1df38855ed6f2ee187e9c582ba6";
const HASH160 = "010966776006953d5567439e5e39f86a0d273bee";
check("hash160(pubkey)", H.bytesToHex(H.hash160(H.hexToBytes(PUB))), HASH160);
check("address", H.b58checkEncode(H.concatBytes(Uint8Array.of(0x00), H.hexToBytes(HASH160))),
  "16UwLL9Risc3QfPqBUvKofHmBQ7wMtjvM");

// --- WIF vector (Bitcoin wiki) ---
const WIF_SECRET = 0x0c28fca386c7a227600b2fe50b7cae11ec86d3bf1fbe471be89827e19d72aa1dn;
check("wif (uncompressed)", H.wif(WIF_SECRET, false, false),
  "5HueCGU8rMjxEXxiPuD5BDku4MkFqeZyd4dZ1jvhTVqvbTLvyTJ");

// --- bech32 / native SegWit addresses (BIP-173) ---
check("p2wpkh from keyhash (BIP-173)",
  H.encodeSegwit("bc", 0, H.hexToBytes("751e76e8199196d454941c45d1b3a323f1433bd6")),
  "bc1qw508d6qejxtdg4y5r3zarvary0c5xw7kv8f3t4");
check("p2wsh from script hash (BIP-173)",
  H.encodeSegwit("tb", 0, H.hexToBytes("1863143c14c5166804bd19203356da136c985678cd4d27a1b8c6329604903262")),
  "tb1qrp33g0q5c5txsp9arysrx4k6zdkfs4nce4xj0gdcccefvpysxf3q0sl5k7");
// a real key's P2WPKH address must match the value the Python core produces
check("p2wpkhAddress(WIF key)", H.p2wpkhAddress(H.pubFromSecret(WIF_SECRET), false),
  "bc1qmy63mjadtw8nhzl69ukdepwzsyvv4yex5qlmkd");

// --- ECDSA sign / verify ---
const pub = H.pubFromSecret(WIF_SECRET);
const z = H.messageHash("Hermes flies");
const sig = H.sign(WIF_SECRET, z, 0x9f86d081884c7d659a2feaa0c55ad015n);
check("verify (good)", H.verify(pub, z, sig), true);
check("verify (tampered msg)", H.verify(pub, H.messageHash("forged"), sig), false);

// --- nonce reuse recovers the private key ---
const k = 0x1234567890abcdef1234567890abcdef1234567890abcdefn;
const z1 = H.messageHash("send 1 BTC to Alice");
const z2 = H.messageHash("send 1 BTC to Bob");
const s1 = H.sign(WIF_SECRET, z1, k, false);
const s2 = H.sign(WIF_SECRET, z2, k, false);
check("nonce-reuse recovers secret",
  H.recoverNonceReuse(z1, s1, z2, s2) === WIF_SECRET, true);

// --- RFC 6979 deterministic nonce: canonical secp256k1 + SHA-256 vector ---
const RFC_SECRET = 0xc9afa9d845ba75166b5c215767b1d6934e50c3db36e89b127b8a622b120f6721n;
const zSample = H.bytesToBigInt(H.sha256(H.utf8("sample")));
check("rfc6979 k (sample)", H.rfc6979K(RFC_SECRET, zSample).toString(16),
  "a6e3c57dd01abe90086538398355dd4c3b17aa873382b0f24d6129493d8aad60");
const rfcSig = H.sign(RFC_SECRET, zSample);
check("rfc6979 r (sample)", rfcSig.r.toString(16),
  "432310e32cb80eb6503a26ce83cc165c783b870845fb8aad6d970889fcd7a6c8");
check("rfc6979 s (sample)", rfcSig.s.toString(16),
  "530128b6b81c548874a6305d93ed071ca6e05074d85863d4056ce89b02bfab69");
// deterministic: signing the same message twice is byte-identical
const detA = H.sign(WIF_SECRET, z1), detB = H.sign(WIF_SECRET, z1);
check("rfc6979 deterministic", detA.r === detB.r && detA.s === detB.s, true);

// --- async: cross-check sha256 vs native crypto.subtle on random inputs ---
async function crossCheck() {
  for (let t = 0; t < 25; t++) {
    const len = Math.floor(Math.random() * 200);
    const msg = new Uint8Array(len);
    crypto.getRandomValues(msg);
    const native = new Uint8Array(await crypto.subtle.digest("SHA-256", msg));
    const ours = H.sha256(msg);
    check(`sha256 vs subtle [len ${len}]`,
      H.bytesToHex(ours), H.bytesToHex(native));
  }
  render();
}

function render() {
  const tbl = document.getElementById("results");
  tbl.innerHTML = rows.map((r) =>
    `<tr class="${r.ok ? "pass" : "fail"}">
       <td class="status">${r.ok ? "PASS" : "FAIL"}</td>
       <td class="name">${r.name}</td>
       <td class="detail">${r.ok ? "" : r.detail.replace(/\n/g, "<br>")}</td>
     </tr>`).join("");
  const s = document.getElementById("summary");
  s.textContent = fail === 0
    ? `✓ all ${pass} vectors pass — JS core matches Python`
    : `✗ ${fail} failing / ${pass} passing`;
  s.style.color = fail === 0 ? "var(--pass)" : "var(--fail)";
  window.__HERMES_RESULT = { pass, fail };
}

render();        // show synchronous results immediately
crossCheck();    // then append the async subtle cross-checks
</script>
</body>
</html>
